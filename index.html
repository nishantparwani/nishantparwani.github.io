    <style>
        /* ========== RESET & BASE ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0a0a0a;
            --secondary: #1a1a1a;
            --accent: #fe4dae;
            --accent-light: #2d76e2;
            --accent-blue: #4d5afe;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --menu-bg: rgba(10, 10, 10, 0.3);
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: var(--text);
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ========== DYNAMIC WEBGL BACKGROUND ========== */
        #webgl-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        /* ========== MENU BUTTON ========== */
        .menu-toggle {
            position: fixed;
            top: 2rem;
            left: 2rem;
            width: 60px;
            height: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle:hover {
            transform: scale(1.1);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(254, 77, 174, 0.3);
        }

        .menu-toggle span {
            width: 24px;
            height: 2px;
            background: var(--text);
            margin: 2px 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-toggle.active span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }

        .menu-toggle.active span:nth-child(2) {
            opacity: 0;
        }

        .menu-toggle.active span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }

        /* ========== NAVIGATION MENU ========== */
        .nav-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            background: var(--menu-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            z-index: 999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .nav-menu.active {
            opacity: 1;
            visibility: visible;
        }

        .nav-items {
            display: flex;
            flex-direction: column;
            gap: 3rem;
            text-align: center;
        }

        .nav-item {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 5rem;
            font-weight: 700;
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            text-decoration: none;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 2px 15px rgba(0, 0, 0, 0.5);
            display: inline-block;
            padding-right: 280px;
        }

        .nav-item:hover {
            color: var(--accent-light);
            letter-spacing: 3px;
            text-shadow: 0 0 30px rgba(45, 118, 226, 0.7);
        }

        .nav-item::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 3px;
            background: var(--accent);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .nav-item:hover::after {
            width: 120%;
        }

        .nav-text {
            position: relative;
            z-index: 1;
        }

        .nav-preview {
            position: absolute;
            right: -300px;
            top: 50%;
            transform: translateY(-50%) scale(0.9);
            width: 250px;
            height: 180px;
            background: var(--primary);
            border-radius: 14px;
            overflow: hidden;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid var(--accent-light);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
            z-index: 1001;
        }

        .preview-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 12px;
            filter: brightness(1.05) contrast(1.1);
        }

        .preview-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, rgba(10, 10, 10, 0.3) 0%, rgba(10, 10, 10, 0.1) 50%, rgba(10, 10, 10, 0.4) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        .nav-item:hover .nav-preview {
            opacity: 1;
            visibility: visible;
            transform: translateY(-50%) scale(1);
            right: -280px;
        }

        .nav-preview::before {
            content: '▶ Preview';
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            opacity: 0.9;
            z-index: 2;
        }

        @media (max-width: 1024px) {
            .nav-item { padding-right: 0; }
            .nav-preview { display: none !important; }
        }

        /* ========== HERO SECTION ========== */
        .hero {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
            width: 90%;
            max-width: 1200px;
        }

        .greeting {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 2rem;
            font-weight: 400;
            color: var(--text-dim);
            margin-bottom: 0.8rem;
            opacity: 0;
            transform: translateY(20px);
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(4rem, 10vw, 8rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 1.5rem;
            color: var(--text);
            opacity: 0;
            transform: translateY(20px);
            text-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }

        .hero-subtitle {
            font-size: 1.4rem;
            color: var(--accent-light);
            max-width: 1000px;
            margin: 0 auto;
            line-height: 1.4;
            font-weight: 400;
            opacity: 0;
            transform: translateY(20px);
            letter-spacing: 0.5px;
        }

        .subtitle-separator {
            color: var(--text);
            margin: 0 1rem;
            font-weight: 300;
        }

        .typewriter-cursor {
            display: inline-block;
            width: 3px;
            height: 1.2em;
            background: var(--accent);
            margin-left: 5px;
            animation: blink 1s infinite;
            vertical-align: middle;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* ========== FOOTER - REDUCED BY 50% ========== */
        .footer-wrapper {
            margin-top: auto;
            padding: 1rem 1rem 1rem 1rem;
            width: 100%;
        }

        .follow-footer {
            position: relative;
            margin: 0 auto;
            width: 90%;
            max-width: 500px;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 40px;
            padding: 0.6rem 1rem;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-family: 'Inter', sans-serif;
            z-index: 10;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.6s ease, transform 0.6s ease;
        }

        .follow-footer.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .footer-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .footer-nav {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .footer-link {
            color: var(--text);
            text-decoration: none;
            font-size: 0.7rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.3rem 0.7rem;
            border-radius: 30px;
            border: 1px solid transparent;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s ease;
        }

        .footer-link i {
            font-size: 0.7rem;
            color: var(--accent-blue);
            transition: all 0.3s ease;
        }

        .footer-link:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-1px);
            background: rgba(77, 90, 254, 0.05);
        }

        .footer-link:hover i {
            color: var(--accent);
            transform: scale(1.05);
        }

        .social-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            width: 100%;
        }

        .follow-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 0.55rem;
            letter-spacing: 2.5px;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .social-icons {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            align-items: center;
        }

        .social-icons a {
            color: var(--text-dim);
            font-size: 0.85rem;
            width: 26px;
            height: 26px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 1px solid transparent;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .social-icons a:hover {
            color: var(--accent-blue);
            border-color: var(--accent-blue);
            transform: translateY(-2px);
            background: rgba(77, 90, 254, 0.05);
        }

        .copyright {
            font-size: 0.5rem;
            color: var(--text-dim);
            text-align: center;
            font-family: 'Montserrat', sans-serif;
            opacity: 0.6;
            margin-top: 0.2rem;
        }

        @media (max-width: 600px) {
            .footer-nav {
                flex-direction: row;
                flex-wrap: wrap;
                gap: 0.4rem;
            }
            .footer-link {
                font-size: 0.65rem;
                padding: 0.25rem 0.6rem;
            }
            .footer-link i {
                font-size: 0.65rem;
            }
            .follow-footer {
                padding: 0.5rem 0.8rem;
                border-radius: 30px;
                max-width: 95%;
            }
            .social-icons {
                gap: 0.6rem;
            }
            .social-icons a {
                font-size: 0.8rem;
                width: 24px;
                height: 24px;
            }
            .follow-text {
                font-size: 0.5rem;
                letter-spacing: 2px;
            }
            .copyright {
                font-size: 0.45rem;
            }
        }

        /* ========== DYNAMIC MOUSE SHADOW ========== */
        #cursor-shadow {
            position: fixed;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: radial-gradient(circle, transparent 0%, rgba(255,255,255,0.3) 30%, rgba(255,255,255,0.8) 100%);
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, background 0.5s ease;
            mix-blend-mode: difference;
        }

        #cursor-inner {
            position: fixed;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #ffffff;
            pointer-events: none;
            z-index: 10000;
            transform: translate(-50%, -50%);
            transition: background 0.5s ease;
            box-shadow: 0 0 10px #ffffff;
        }

        @media (max-width: 768px) {
            .hero-title { font-size: clamp(3rem, 9vw, 5rem); }
            .greeting { font-size: 1.5rem; }
            .hero-subtitle { font-size: 1rem; }
            .nav-item { font-size: 3rem; }
        }
        @media (max-width: 480px) {
            .hero-title { font-size: clamp(2.5rem, 13vw, 3.5rem); }
            .nav-item { font-size: 2rem; }
        }
    </style>
</head>

    <script>
        // ========== INFINITE WEBGL BACKGROUND ==========
        function initWebGLBackground() {
            const canvas = document.getElementById('webgl-bg');
            if (!canvas) return;
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            
            const gridHelper = new THREE.GridHelper(200, 200, 0x4d5afe, 0x4d5afe);
            gridHelper.material.opacity = 0.08;
            gridHelper.material.transparent = true;
            scene.add(gridHelper);
            
            const pyramids = [];
            for (let i = 0; i < 40; i++) {
                const geometry = new THREE.ConeGeometry(0.6, 1.2, 4);
                const isRed = i < 12;
                const color = isRed ? 0xfe4dae : 0x4d5afe;
                const material = new THREE.MeshBasicMaterial({ color: color, wireframe: true, transparent: true, opacity: 0.15 + Math.random() * 0.25 });
                const pyramid = new THREE.Mesh(geometry, material);
                pyramid.position.x = (Math.random() - 0.5) * 80;
                pyramid.position.y = (Math.random() - 0.5) * 30;
                pyramid.position.z = (Math.random() - 0.5) * 80;
                pyramid.rotation.x = Math.random() * Math.PI;
                pyramid.rotation.y = Math.random() * Math.PI;
                pyramid.userData = { rotationSpeedX: (Math.random() - 0.5) * 0.008, rotationSpeedY: (Math.random() - 0.5) * 0.008, floatSpeed: 0.5 + Math.random(), floatAmplitude: 0.2 + Math.random() * 0.6 };
                scene.add(pyramid);
                pyramids.push(pyramid);
            }
            
            const cubes = [];
            for (let i = 0; i < 25; i++) {
                const geometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
                const material = new THREE.MeshBasicMaterial({ color: 0x6d7cff, wireframe: true, transparent: true, opacity: 0.08 });
                const cube = new THREE.Mesh(geometry, material);
                cube.position.x = (Math.random() - 0.5) * 90;
                cube.position.y = (Math.random() - 0.5) * 30;
                cube.position.z = (Math.random() - 0.5) * 90;
                cube.userData = { rotationSpeedX: (Math.random() - 0.5) * 0.006, rotationSpeedY: (Math.random() - 0.5) * 0.006 };
                scene.add(cube);
                cubes.push(cube);
            }
            
            const particleCount = 150;
            const particleGeometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const colors = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 200;
                positions[i*3+1] = (Math.random() - 0.5) * 40;
                positions[i*3+2] = (Math.random() - 0.5) * 200;
                const isRedP = Math.random() < 0.3;
                if (isRedP) { colors[i*3]=0.99; colors[i*3+1]=0.30; colors[i*3+2]=0.68; }
                else { colors[i*3]=0.30; colors[i*3+1]=0.35; colors[i*3+2]=1.00; }
            }
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            particleGeometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            const particleMaterial = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.2, blending: THREE.AdditiveBlending });
            const particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);
            
            camera.position.z = 40;
            camera.position.y = 10;
            let mouseX = 0, mouseY = 0;
            document.addEventListener('mousemove', (e) => { mouseX = (e.clientX / window.innerWidth) * 2 - 1; mouseY = -(e.clientY / window.innerHeight) * 2 + 1; });
            
            function animate() {
                requestAnimationFrame(animate);
                const time = Date.now() * 0.001;
                gridHelper.rotation.y += 0.0002;
                pyramids.forEach((p, idx) => { p.rotation.x += p.userData.rotationSpeedX; p.rotation.y += p.userData.rotationSpeedY; p.position.y += Math.sin(time * p.userData.floatSpeed + idx) * 0.006 * p.userData.floatAmplitude; });
                cubes.forEach((c, idx) => { c.rotation.x += c.userData.rotationSpeedX; c.rotation.y += c.userData.rotationSpeedY; c.position.y += Math.sin(time * 0.5 + idx) * 0.003; });
                particles.rotation.y += 0.00015;
                camera.position.x += (mouseX * 15 - camera.position.x) * 0.05;
                camera.position.y += (mouseY * 8 - camera.position.y) * 0.05;
                camera.lookAt(scene.position);
                renderer.render(scene, camera);
            }
            animate();
            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }
        
        function initMenuToggle() {
            const toggle = document.getElementById('menuToggle');
            const menu = document.getElementById('navMenu');
            const items = document.querySelectorAll('.nav-item');
            if (!toggle || !menu) return;
            toggle.addEventListener('click', (e) => {
                e.stopPropagation();
                toggle.classList.toggle('active');
                menu.classList.toggle('active');
                if (menu.classList.contains('active')) {
                    document.querySelectorAll('.preview-video').forEach(v => { v.currentTime = 0; v.play().catch(()=>{}); });
                    items.forEach((it, idx) => gsap.to(it, { opacity: 1, y: 0, duration: 0.6, delay: idx * 0.15, ease: "power3.out" }));
                } else {
                    items.forEach(it => gsap.to(it, { opacity: 0, y: 20, duration: 0.4, ease: "power2.in" }));
                }
            });
            items.forEach(it => {
                it.addEventListener('click', (e) => {
                    e.preventDefault();
                    items.forEach(nav => gsap.to(nav, { opacity: 0, y: 20, duration: 0.3 }));
                    setTimeout(() => { toggle.classList.remove('active'); menu.classList.remove('active'); }, 300);
                    setTimeout(() => { window.location.href = it.getAttribute('href'); }, 400);
                });
            });
            document.addEventListener('click', (e) => {
                if (menu.classList.contains('active') && !menu.contains(e.target) && !toggle.contains(e.target)) {
                    items.forEach(it => gsap.to(it, { opacity: 0, y: 20, duration: 0.3 }));
                    setTimeout(() => { toggle.classList.remove('active'); menu.classList.remove('active'); }, 300);
                }
            });
        }
        
        function initTypewriter() {
            const greetingFull = "Hi I am,";
            const nameFull = "Nishant Parwani";
            const subtitleFull = "Sophomore at SVKM's Narsee Monjee Institute of Management Studies, Mumbai | Student Council Contingent Leader | USFC '24";
            setTimeout(() => {
                const greetEl = document.getElementById('greetingText');
                let i = 0;
                const t1 = setInterval(() => {
                    if (i < greetingFull.length) { greetEl.innerHTML = greetingFull.substring(0, i+1) + '<span class="typewriter-cursor"></span>'; i++; }
                    else { clearInterval(t1); greetEl.innerHTML = greetingFull; gsap.to(greetEl, { opacity:1, y:0, duration:0.8 }); setTimeout(typeName, 150); }
                }, 100);
            }, 500);
            function typeName() {
                const nameEl = document.getElementById('nameText');
                let i = 0;
                const t2 = setInterval(() => {
                    if (i < nameFull.length) { nameEl.innerHTML = nameFull.substring(0, i+1) + '<span class="typewriter-cursor"></span>'; i++; }
                    else { clearInterval(t2); nameEl.innerHTML = nameFull; gsap.to(nameEl, { opacity:1, y:0, duration:0.8 }); setTimeout(typeSub, 150); }
                }, 120);
            }
            function typeSub() {
                const subEl = document.getElementById('subtitleText');
                subEl.style.opacity = 1;
                let i = 0;
                const t3 = setInterval(() => {
                    if (i < subtitleFull.length) { subEl.innerHTML = subtitleFull.substring(0, i+1) + '<span class="typewriter-cursor"></span>'; i++; }
                    else { clearInterval(t3); subEl.innerHTML = subtitleFull; gsap.to(subEl, { opacity:1, y:0, duration:0.8 }); }
                }, 40);
            }
        }
        
        function initDynamicMouseShadow() {
            const shadow = document.getElementById('cursor-shadow');
            const inner = document.getElementById('cursor-inner');
            if (!shadow || !inner) return;
            let mouseX = 0, mouseY = 0, shadowX = 0, shadowY = 0, innerX = 0, innerY = 0;
            document.addEventListener('mousemove', (e) => { mouseX = e.clientX; mouseY = e.clientY; });
            function animateCursor() {
                shadowX += (mouseX - shadowX) * 0.08;
                shadowY += (mouseY - shadowY) * 0.08;
                innerX += (mouseX - innerX) * 0.2;
                innerY += (mouseY - innerY) * 0.2;
                shadow.style.left = shadowX + 'px';
                shadow.style.top = shadowY + 'px';
                inner.style.left = innerX + 'px';
                inner.style.top = innerY + 'px';
                requestAnimationFrame(animateCursor);
            }
            document.body.style.cursor = 'none';
            document.addEventListener('mouseleave', () => { shadow.style.opacity = '0'; inner.style.opacity = '0'; });
            document.addEventListener('mouseenter', () => { shadow.style.opacity = '1'; inner.style.opacity = '1'; });
            animateCursor();
        }
        
        function initNavVideoPreviews() {
            document.querySelectorAll('.preview-video').forEach(v => { v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true; });
        }
        
        // ========== FOOTER APPEARS AFTER 5 SECONDS ==========
        function initFooterDelay() {
            const footer = document.getElementById('globalFooter');
            if (footer) {
                setTimeout(() => {
                    footer.classList.add('visible');
                }, 5000);
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            initWebGLBackground();
            initMenuToggle();
            initDynamicMouseShadow();
            initNavVideoPreviews();
            initTypewriter();
            initFooterDelay();
        });
    </script>
</body>
